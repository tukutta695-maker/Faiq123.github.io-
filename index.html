<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --roblox: #e83b3b;
      --roblox-dark: #c42e2e;
      --discord: #5865F2;
      --discord-dark: #4752c4;
      --bg: #0d0d0f;
      --surface: #17171a;
      --surface2: #1f1f24;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f0;
      --muted: #888;
      --accent-glow-r: rgba(232, 59, 59, 0.18);
      --accent-glow-d: rgba(88, 101, 242, 0.18);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      padding: 2rem 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem 2rem;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 260px;
      height: 120px;
      background: radial-gradient(ellipse, rgba(232,59,59,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      margin-bottom: 1.25rem;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: var(--surface2);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
    }

    .status-dot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #3ba55d;
      border: 3px solid var(--surface);
    }

    /* Name & tag */
    .name {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #fff;
      margin-bottom: 4px;
    }

    .handle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    /* Pill badges */
    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .pill {
      font-size: 12px;
      font-weight: 500;
      padding: 5px 13px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 5px;
      letter-spacing: 0.2px;
    }

    .pill-roblox {
      background: rgba(232,59,59,0.13);
      color: #f87070;
      border: 1px solid rgba(232,59,59,0.25);
    }

    .pill-discord {
      background: rgba(88,101,242,0.13);
      color: #8b96ff;
      border: 1px solid rgba(88,101,242,0.25);
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 1.75rem;
    }

    /* Buttons */
    .btn-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      padding: 15px 24px;
      border-radius: 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      letter-spacing: 0.1px;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .btn:active {
      transform: translateY(0px) scale(0.98);
      filter: brightness(0.95);
    }

    .btn-roblox {
      background: var(--roblox);
      color: #fff;
      box-shadow: 0 4px 24px rgba(232,59,59,0.28);
    }

    .btn-discord {
      background: var(--discord);
      color: #fff;
      box-shadow: 0 4px 24px rgba(88,101,242,0.28);
    }

    .btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      fill: currentColor;
    }

    /* Footer */
    .footer {
      margin-top: 1.5rem;
      font-size: 13px;
      color: #444;
      text-align: center;
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.25rem 1.5rem; }
      .name { font-size: 21px; }
    }
  </style>
</head>
<body>

<main class="page">
  <div class="card">

    <div class="avatar-wrap">
      <div class="avatar">🎮</div>
      <div class="status-dot"></div>
    </div>

    <p class="name">My Profile</p>

    <div class="btn-group">

        Join Discord Server
      </a>
    </div>

  </div>

  <p class="footer">Click a button to connect ↑</p>
</main>

</body>
</html>
